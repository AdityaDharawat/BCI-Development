name: Daily AI Commit

on:
  schedule:
    # 12:30 AM IST
    - cron: '0 19 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Run AI Research Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python ai_update.py

      - name: Commit Changes
        run: |
          git config user.name "Swady-AI"
          git config user.email "adharawatwork@gmail.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "No changes detected."
          else
            COMMIT_TIME=$(date +"%Y-%m-%d %H:%M:%S")

            git commit -m "AI research update - $COMMIT_TIME"

            git push
          fi