name: Daily AI Commit

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # 12:30 AM IST
    - cron: '0 19 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Swady AI Research Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "Starting autonomous AI research update..."
          python ai_update.py
          echo "Research update completed."

      - name: Commit and Push Changes
        run: |
          git config user.name "Swady-AI"
          git config user.email "adharawatwork@gmail.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "No changes detected."
          else
            COMMIT_TIME=$(TZ='Asia/Kolkata' date +"%Y-%m-%d %H:%M:%S IST")

            git commit -m "Daily BCI progress log - $COMMIT_TIME"

            git push origin main
          fi

      - name: Workflow Complete
        run: |
          echo "Swady autonomous workflow executed successfully."