name: Daily AI Commit

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Run AI Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python ai_update.py

      - name: Commit and Push
        run: |
          git config user.name "AI-Agent"
          git config user.email "adharawatwork@gmail.com"

          git add .

          git diff --cached --quiet || git commit -m "Daily AI repository improvement"

          git push